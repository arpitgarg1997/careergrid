<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72" width="72" height="72">
  <defs>
    <linearGradient id="wg" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="50%" stop-color="#FF9F43"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="wa" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <filter id="ig" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#FF6B6B" flood-opacity="0.3"/>
    </filter>
    <filter id="ag" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <g transform="translate(4, 4)" filter="url(#ig)">
    <rect x="0" y="0" width="28" height="28" rx="8" fill="url(#wg)" opacity="0.15"/>
    <rect x="36" y="0" width="28" height="28" rx="8" fill="url(#wg)" opacity="0.35"/>
    <rect x="0" y="36" width="28" height="28" rx="8" fill="url(#wg)" opacity="0.55"/>
    <rect x="36" y="36" width="28" height="28" rx="8" fill="url(#wg)" opacity="1"/>

    <g filter="url(#ag)">
      <path d="M10 55 L54 11" stroke="url(#wa)" stroke-width="4.5" stroke-linecap="round" fill="none"/>
      <path d="M42 9 L56 9 L56 23" stroke="url(#wa)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
  </g>
</svg>
